<main class="pt-24 pb-20 container mx-auto px-4">
    <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="grid md:grid-cols-2 gap-0">
            <div class="bg-gray-50 p-8 flex items-center justify-center">
                <img id="pd-image" src="" alt="Product" class="max-w-full h-auto object-contain drop-shadow-lg">
            </div>
            <div class="p-8 md:p-12 flex flex-col justify-center space-y-6">
                <span class="inline-block bg-blue-50 text-primary px-3 py-1 rounded-full text-sm font-bold w-fit">دسته‌بندی</span>
                <h1 id="pd-title" class="text-3xl md:text-4xl font-black text-secondary leading-tight"></h1>
                <div class="flex items-center gap-2 text-yellow-400 text-sm">
                    <i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star-half-stroke"></i>
                    <span class="text-gray-400 mr-2 text-xs">(۴۵ دیدگاه)</span>
                </div>
                <p id="pd-price" class="text-3xl font-black text-primary"></p>
                <p id="pd-desc" class="text-gray-600 leading-8 text-justify"></p>
                
                <div class="flex gap-4 pt-4">
                    <button id="pd-add-btn" class="flex-1 bg-primary text-white py-4 rounded-xl font-bold hover:bg-blue-700 transition shadow-lg shadow-blue-500/30 flex items-center justify-center gap-2">
                        <i class="fa-solid fa-cart-shopping"></i> افزودن به سبد خرید
                    </button>
                    <button class="w-16 h-16 border border-gray-200 rounded-xl flex items-center justify-center hover:bg-red-50 hover:text-red-500 transition text-xl"><i class="fa-regular fa-heart"></i></button>
                </div>
                
                <div class="grid grid-cols-3 gap-4 pt-6 border-t border-gray-100 text-center text-sm text-gray-500">
                    <div><i class="fa-solid fa-truck-fast text-primary text-xl mb-2 block"></i>ارسال رایگان</div>
                    <div><i class="fa-solid fa-shield-halved text-primary text-xl mb-2 block"></i>ضمانت اصالت</div>
                    <div><i class="fa-solid fa-rotate-left text-primary text-xl mb-2 block"></i>۷ روز بازگشت</div>
                </div>
            </div>
        </div>
    </div>
</main>
